name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --exclude='api' --exclude='dashboard' --exclude='public' --exclude='app' --exclude='artisan' --exclude='bootstrap' --exclude='config' --exclude='database' --exclude='vendor' --exclude='storage' --exclude='routes' --exclude='resources' --exclude='composer.*' --exclude='.env' --exclude='seed_blogs.php' --exclude='keywords.txt' --exclude='google*' --exclude='src' --exclude='node_modules' --exclude='package.json' --exclude='package-lock.json' --exclude='README.md' --exclude='eslint.config.js'
          path: dist/
          remote_path: /home/u461323939/domains/bedouintrails.com/public_html/
          remote_host: 62.72.17.235
          remote_port: 65002
          remote_user: u461323939
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
